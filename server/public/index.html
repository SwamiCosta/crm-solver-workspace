<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM-SOLVER Interfacer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo {
      width: 28px; height: 28px;
      background: #2563eb;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 13px; font-weight: 700;
    }
    .title { font-weight: 600; font-size: 15px; color: #0f172a; }

    .mode-badge {
      font-size: 11px; font-weight: 600;
      padding: 3px 9px; border-radius: 12px;
      text-transform: uppercase; letter-spacing: 0.4px;
    }
    .mode-badge.suggest      { background: #dbeafe; color: #1d4ed8; }
    .mode-badge.auto-correct { background: #dcfce7; color: #15803d; }

    .token-wrap { display: flex; align-items: center; gap: 8px; }
    .token-label { font-size: 12px; color: #94a3b8; }
    .token-input {
      font-size: 12px; padding: 5px 10px;
      border: 1px solid #e2e8f0; border-radius: 6px;
      width: 190px; outline: none; color: #334155;
      background: #f8fafc;
    }
    .token-input:focus { border-color: #3b82f6; background: #fff; }

    /* ── Chat area ── */
    .chat {
      flex: 1; overflow-y: auto;
      padding: 24px 20px;
      display: flex; flex-direction: column; gap: 18px;
    }

    /* ── Messages ── */
    .msg { display: flex; flex-direction: column; max-width: 72%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; align-items: flex-start; }

    .msg-bubble {
      padding: 10px 14px; border-radius: 14px;
      font-size: 14px; line-height: 1.55;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: #2563eb; color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot .msg-bubble {
      background: #fff; color: #1e293b;
      border: 1px solid #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    .msg-meta {
      display: flex; align-items: center; gap: 6px;
      margin-top: 5px;
    }
    .msg-time { font-size: 11px; color: #cbd5e1; }

    .op-badge {
      font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 10px;
      text-transform: uppercase; letter-spacing: 0.3px;
    }
    .op-analyze     { background: #dbeafe; color: #1d4ed8; }
    .op-correct     { background: #fef3c7; color: #b45309; }
    .op-intercept   { background: #f3e8ff; color: #7c3aed; }
    .op-mode_change { background: #dcfce7; color: #15803d; }
    .op-feedback    { background: #f1f5f9; color: #475569; }
    .op-clarify     { background: #fef9c3; color: #854d0e; }
    .op-error       { background: #fee2e2; color: #dc2626; }

    details { margin-top: 8px; width: 100%; }
    summary {
      font-size: 12px; color: #94a3b8;
      cursor: pointer; user-select: none;
      list-style: none; outline: none;
    }
    summary::-webkit-details-marker { display: none; }
    summary::before { content: '▶  '; font-size: 9px; }
    details[open] summary::before { content: '▼  '; }
    summary:hover { color: #64748b; }

    .json-block {
      margin-top: 8px;
      background: #f8fafc; border: 1px solid #e2e8f0;
      border-radius: 8px; padding: 10px 12px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 11px; color: #334155;
      white-space: pre; overflow-x: auto;
      max-height: 220px; overflow-y: auto;
    }

    /* ── Typing indicator ── */
    .typing .msg-bubble {
      background: #fff; border: 1px solid #e2e8f0;
      padding: 13px 16px;
    }
    .dot {
      display: inline-block;
      width: 6px; height: 6px; border-radius: 50%;
      background: #cbd5e1; margin: 0 2px;
      animation: pulse 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100% { opacity: 0.2; transform: scale(0.85); } 40% { opacity: 1; transform: scale(1); } }

    /* ── Input area ── */
    .input-area {
      background: #fff; border-top: 1px solid #e2e8f0;
      padding: 12px 20px;
      display: flex; gap: 10px; align-items: flex-end;
      flex-shrink: 0;
    }
    textarea {
      flex: 1; resize: none;
      border: 1px solid #e2e8f0; border-radius: 10px;
      padding: 10px 14px; font-size: 14px; font-family: inherit;
      line-height: 1.5; outline: none;
      max-height: 120px; color: #1e293b;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: #3b82f6; }
    textarea::placeholder { color: #cbd5e1; }

    .send-btn {
      background: #2563eb; color: #fff;
      border: none; border-radius: 10px;
      padding: 0 20px; height: 42px;
      font-size: 14px; font-weight: 500;
      cursor: pointer; white-space: nowrap;
      transition: background 0.15s; flex-shrink: 0;
    }
    .send-btn:hover:not(:disabled) { background: #1d4ed8; }
    .send-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">CS</div>
    <span class="title">CRM-SOLVER Interfacer</span>
    <span class="mode-badge suggest" id="mode-badge">suggest</span>
  </div>
  <div class="token-wrap">
    <span class="token-label">Operator token</span>
    <input type="password" id="token-input" class="token-input" placeholder="required for mode changes">
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
  <textarea id="msg-input" rows="1"
    placeholder="Describe a record, ask what's wrong, request a correction, or change the operating mode…"></textarea>
  <button class="send-btn" id="send-btn">Send</button>
</div>

<script>
  const chatEl   = document.getElementById('chat');
  const inputEl  = document.getElementById('msg-input');
  const sendBtn  = document.getElementById('send-btn');
  const tokenEl  = document.getElementById('token-input');
  const modeBadge = document.getElementById('mode-badge');

  // ── Helpers ──────────────────────────────────────────────────────────────

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function timeNow() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function scrollBottom() {
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  // ── Mode badge ────────────────────────────────────────────────────────────

  function setMode(mode) {
    modeBadge.textContent = mode;
    modeBadge.className = 'mode-badge ' + mode;
  }

  async function syncMode() {
    try {
      const r = await fetch('/health');
      const d = await r.json();
      setMode(d.mode);
    } catch {}
  }
  syncMode();
  setInterval(syncMode, 10000);

  // ── Message rendering ─────────────────────────────────────────────────────

  function addUserMsg(text) {
    const el = document.createElement('div');
    el.className = 'msg user';
    el.innerHTML = `
      <div class="msg-bubble">${esc(text)}</div>
      <div class="msg-meta"><span class="msg-time">${timeNow()}</span></div>
    `;
    chatEl.appendChild(el);
    scrollBottom();
  }

  function addTyping() {
    const el = document.createElement('div');
    el.className = 'msg bot typing';
    el.id = 'typing-indicator';
    el.innerHTML = `<div class="msg-bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
    chatEl.appendChild(el);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function addBotMsg(data) {
    const op = data.operation || 'error';
    const text = data.response || data.error || 'No response received.';
    const hasResult = data.result && Object.keys(data.result).length > 0;

    const el = document.createElement('div');
    el.className = 'msg bot';
    el.innerHTML = `
      <div class="msg-bubble">${esc(text)}</div>
      <div class="msg-meta">
        <span class="msg-time">${timeNow()}</span>
        <span class="op-badge op-${esc(op)}">${esc(op)}</span>
      </div>
      ${hasResult ? `
        <details>
          <summary>Show raw result</summary>
          <div class="json-block">${esc(JSON.stringify(data.result, null, 2))}</div>
        </details>` : ''}
    `;
    chatEl.appendChild(el);
    scrollBottom();
  }

  function addWelcome() {
    const el = document.createElement('div');
    el.className = 'msg bot';
    el.innerHTML = `
      <div class="msg-bubble">Hello. I'm the CRM-SOLVER Interfacer.\n\nI can analyse records for data quality issues, propose or apply corrections, register false positives, and change the operating mode.\n\nWrite in any language — I'll always respond in English.</div>
      <div class="msg-meta"><span class="msg-time">${timeNow()}</span></div>
    `;
    chatEl.appendChild(el);
  }

  // ── Send ──────────────────────────────────────────────────────────────────

  async function send() {
    const message = inputEl.value.trim();
    if (!message) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addUserMsg(message);
    addTyping();

    try {
      const body = { message };
      const token = tokenEl.value.trim();
      if (token) body.operator_token = token;

      const res = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      const data = await res.json();
      removeTyping();

      if (!res.ok) {
        addBotMsg({ response: data.error || `Server error ${res.status}.`, operation: 'error', result: {} });
      } else {
        addBotMsg(data);
        if (data.operation === 'mode_change' && data.result?.mode) {
          setMode(data.result.mode);
        }
      }
    } catch {
      removeTyping();
      addBotMsg({ response: 'Connection error. Is the server running?', operation: 'error', result: {} });
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  sendBtn.addEventListener('click', send);

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  addWelcome();
  inputEl.focus();
</script>

</body>
</html>
